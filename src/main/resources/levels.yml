# Лимит участников по дефолту (1 ур)
default-max-members: 1
# Количество доступных слотов в клановом хранилище по дефолту (1 ур)
default-storage-slots: 4

exp:
  block-break: 3 # опыт за ломание блока
  mob-kill: 5 # опыт за килл моба
  player-kill: 20 # опыт за килл игрока

# Уровни клана
clan-levels:
  - level: 2
    max-members: 5
    storage-slots: 9 # Сколько слотов в хранилище будет доступно на 2 уровне
    required-exp: 100
    sound: ENTITY_PLAYER_LEVELUP;1.0;2.0
    message:
      - ""
      - " <#52C25A>✔ <gray>| <white>Ваш клан <#FCD05C>{clan} <white>достиг <gold>2 уровня<white>!"
      - "    <gray>| <white>Новый лимит участников: <gold>{max_members}"
      - "    <gray>| <white>В хранилище открыто: <gold>9 слотов"
      - ""

  - level: 3
    max-members: 10
    storage-slots: 14
    required-exp: 1000
    sound: ENTITY_PLAYER_LEVELUP;1.0;2.0
    message:
      - ""
      - " <#52C25A>✔ <gray>| <white>Ваш клан <#FCD05C>{clan} <white>достиг <gold>3 уровня<white>!"
      - "    <gray>| <white>Новый лимит участников: <gold>{max_members}"
      - "    <gray>| <white>В хранилище открыто: <gold>14 слотов"
      - ""

  - level: 4
    max-members: 15
    storage-slots: 19
    required-exp: 15000
    sound: ENTITY_PLAYER_LEVELUP;1.0;2.0
    message:
      - ""
      - " <#52C25A>✔ <gray>| <white>Ваш клан <#FCD05C>{clan} <white>достиг <gold>4 уровня<white>!"
      - "    <gray>| <white>Новый лимит участников: <gold>{max_members}"
      - "    <gray>| <white>В хранилище открыто: <gold>19 слотов"
      - ""

  - level: 5
    max-members: 20
    storage-slots: 24
    required-exp: 20000
    sound: ENTITY_PLAYER_LEVELUP;1.0;2.0
    message:
      - ""
      - " <#52C25A>✔ <gray>| <white>Ваш клан <#FCD05C>{clan} <white>достиг <gold>5 уровня<white>!"
      - "    <gray>| <white>Новый лимит участников: <gold>{max_members}"
      - "    <gray>| <white>В хранилище открыто: <gold>24 слота"
      - ""

  - level: 6
    max-members: 25
    storage-slots: 28
    required-exp: 25000
    sound: ENTITY_PLAYER_LEVELUP;1.0;2.0
    message:
      - ""
      - " <#52C25A>✔ <gray>| <white>Ваш клан <#FCD05C>{clan} <white>достиг <gold>6 уровня<white>!"
      - "    <gray>| <white>Новый лимит участников: <gold>{max_members}"
      - "    <gray>| <white>Хранилище расширено до <gold>максимума (28 слотов)<white>!"
      - ""